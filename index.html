<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app-header">
        <div id="app-title">To Do List</div>
        <button id="open-create-todo-btn">Create</button>
    </div>

    <div class="todo-list"></div>

    <div id="create-todo">
        <form id="create-todo-form" class="todo-card-modal">
            <label for="create-todo-title">Title:</label>
            <input type="text" name="create-todo-title" id="create-todo-title" maxlength="40" required>
            <small class="field-hint">Up to 40 characters</small>
            <label for="create-todo-text">Description</label>
            <textarea name="create-todo-text" id="create-todo-text" maxlength="240" rows="4"></textarea>
            <small class="field-hint">Up to 240 characters</small>
            <label for="create-todo-time">Date:</label>
            <input type="date" name="create-todo-time" id="create-todo-time">
            <button type="submit" id="create-todo-btn">Create</button>
        </form>
    </div>

    <div id="edit-todo">
        <form id="edit-todo-form" class="todo-card-modal">
            <label for="edit-todo-title">Title:</label>
            <input type="text" name="title" id="edit-todo-title" maxlength="40" required>
            <small class="field-hint">Up to 40 characters</small>
            <label for="edit-todo-text">Description</label>
            <textarea name="edit-todo-text" id="edit-todo-text" maxlength="240" rows="4"></textarea>
            <small class="field-hint">Up to 240 characters</small>
            <label for="edit-todo-time">Date:</label>
            <input type="date" name="edit-todo-time" id="edit-todo-time">
            <button type="submit" id="save-edit-btn">Save</button>
        </form>
    </div>
  
    

    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</body>

</html>
