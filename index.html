<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">

</head>

<body>
    <div id="side-panel">

        <div id="sidebar-header">
            <span class="mdi mdi-view-dashboard" aria-hidden="true"></span>
            <div id="app-title">To Do List</div>
        </div>

        <button id="open-create-todo-btn">Create</button>
    </div>
    

    <div id = "main">
        <div class="todo-list"></div>

        <div id="create-todo">
            <form class="todo-card-list">
                <label for="create-todo-title">Title:</label>
                <input type="text" name="create-todo-title" id="create-todo-title" maxlength="50">
                <label for="create-todo-text">Description</label>
                <input type="text" name="create-todo-text" id="create-todo-text" maxlength="250">
                <label for="create-todo-time">Time:</label>
                <input type="date" name="create-todo-time" id="create-todo-time">
                <button type="button" id="create-todo-btn">Create</button>
            </form>
        </div>

        <div id="edit-todo">
            <form class="todo-card-list">
                <label for="edit-todo-title">Title:</label>
                <input type="text" name="title" id="edit-todo-title" maxlength="50">
                <label for="edit-todo-text">Description</label>
                <input type="text" name="edit-todo-text" id="edit-todo-text" maxlength="250">
                <label for="edit-todo-time">Time:</label>
                <input type="date" name="edit-todo-time" id="edit-todo-time">
                <button type="button" id="save-edit-btn">Save</button>
            </form>
        </div>
    </div>
    

    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</body>

</html>
